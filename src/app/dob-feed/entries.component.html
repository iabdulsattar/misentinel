<div class="grid grid-cols-12 gap-4 ">
  <div class="col-span-12 space-y-4"
       [ngClass]="showSidebar ? 'xl:col-span-9' : 'xl:col-span-12'">
    <app-entry-create (create)="createEntry()" />
    <app-entries-types
      [entryTypes]="entryTypes"
      [orgUsers]="orgUsers"
      [statuses]="statuses"
      [priorities]="priorities"
      [filters]="filters"
      (filtersChange)="onFilterChange($event)"
    />
    <app-entries-metrics [metrics]="metrics" />
    <app-entries-table
      class="mt-4"
      [entries]="entries"
      [loading]="loading"
      [total]="total"
      [page]="page"
      [size]="size"
      [showingText]="getShowingText()"
      (searchChange)="onSearch($event)"
      (pageChange)="onPageChange($event)"
      (idClicked)="onIdClick($event)"
    />
  </div>

  <div class="col-span-12 xl:col-span-3"
       *ngIf="showSidebar">
    <app-entries-followup
      [entry]="selectedEntry"
      (edit)="editEntry()"
      (close)="closeSidebar()"
    />
  </div>
</div>
