<app-modal [isOpen]="true" [showCloseButton]="false" (close)="cancel()" className="max-w-md">
  <div class="p-6 sm:p-8 relative">

    <button (click)="cancel()" class="absolute top-5 right-5 text-slate-400 hover:text-slate-600">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    </button>

    <div class="flex items-start gap-4 mb-6 pr-6">
      <div class="flex h-12 w-12 items-center justify-center rounded-xl bg-indigo-50 shrink-0">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-indigo-600"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"></path></svg>
      </div>
      <div>
        <h2 class="text-lg font-bold text-slate-900">Add Category</h2>
        <p class="text-sm text-slate-500 mt-0.5">Create a new category for entries.</p>
      </div>
    </div>

    @if (errorMessage) {
      <div class="flex items-start gap-2.5 rounded-xl p-3.5 mb-6 bg-red-50 border border-red-100">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-red-500 mt-0.5 shrink-0"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
        <p class="text-sm font-medium text-red-700">{{ errorMessage }}</p>
      </div>
    }

    <div class="space-y-4 mb-6">
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1.5">Category Name <span class="text-red-500">*</span></label>
        <input
          type="text"
          [(ngModel)]="name"
          placeholder="e.g., Health & Safety"
          class="w-full border border-gray-200 rounded-lg px-3.5 py-2.5 text-sm outline-none focus:border-gray-400"
        />
      </div>
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1.5">Color</label>
        <select
          [(ngModel)]="color"
          class="w-full border border-gray-200 rounded-lg px-3.5 py-2.5 text-sm outline-none focus:border-gray-400 bg-white"
        >
          @for (opt of colorOptions; track opt.value) {
            <option [value]="opt.value">{{ opt.label }}</option>
          }
        </select>
      </div>
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1.5">Description</label>
        <textarea
          rows="3"
          [(ngModel)]="description"
          placeholder="Optional description..."
          class="w-full border border-gray-200 rounded-lg px-3.5 py-2.5 text-sm outline-none focus:border-gray-400 resize-none"
        ></textarea>
      </div>
    </div>

    <div class="flex justify-end gap-3">
      <button (click)="cancel()" class="px-5 py-2.5 rounded-lg border border-slate-200 text-slate-700 font-semibold text-sm hover:bg-slate-50">
        Cancel
      </button>
      <button (click)="confirm()" [disabled]="isSubmitting || !name.trim()" class="flex items-center gap-2 px-5 py-2.5 rounded-lg bg-indigo-600 text-white font-semibold text-sm hover:bg-indigo-700 disabled:opacity-70">
        @if (isSubmitting) {
          <span>Saving...</span>
        } @else {
          <span>Create Category</span>
        }
      </button>
    </div>

  </div>
</app-modal>
