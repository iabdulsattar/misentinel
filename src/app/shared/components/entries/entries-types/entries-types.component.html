<div class="grid grid-cols-1 gap-2 sm:grid-cols-2 lg:grid-cols-5 ">
  <div class="mb-4 rounded-2xl border border-gray-200 bg-white p-3 dark:border-gray-800 dark:bg-white/[0.03]">
    <label class="block font-semibold text-gray-800 text-theme-xs dark:text-white/90 mb-1">Type</label>
    <app-single-select
      [options]="typeOptions"
      placeholder="All Types"
      [value]="filters.typeId"
      (valueChange)="filters.typeId = $event; emit()"
    />
  </div>

  <div class="mb-4 rounded-2xl border border-gray-200 bg-white p-3 dark:border-gray-800 dark:bg-white/[0.03]">
    <label class="block font-semibold text-gray-800 text-theme-xs dark:text-white/90 mb-1">Status</label>
    <app-single-select
      [options]="statusOptions"
      placeholder="All Statuses"
      [value]="filters.status"
      (valueChange)="onStatusChange($event)"
    />
  </div>

  <div class="mb-4 rounded-2xl border border-gray-200 bg-white p-3 dark:border-gray-800 dark:bg-white/[0.03]">
    <label class="block font-semibold text-gray-800 text-theme-xs dark:text-white/90 mb-1">Priority</label>
    <app-single-select
      [options]="priorityOptions"
      placeholder="All Priorities"
      [value]="filters.priority"
      (valueChange)="onPriorityChange($event)"
    />
  </div>

  <div class="mb-4 rounded-2xl border border-gray-200 bg-white p-3 dark:border-gray-800 dark:bg-white/[0.03]">
    <label class="block font-semibold text-gray-800 text-theme-xs dark:text-white/90 mb-1">Created By</label>
    <app-single-select
      [options]="userOptions"
      placeholder="All Users"
      [value]="filters.createdBy"
      (valueChange)="filters.createdBy = $event; emit()"
    />
  </div>

  <div class="mb-4 rounded-2xl border border-gray-200 bg-white p-3 dark:border-gray-800 dark:bg-white/[0.03]">
    <label class="block font-semibold text-gray-800 text-theme-xs dark:text-white/90 mb-1">Date Range</label>
    <app-date-picker
      id="entry-date-range"
      mode="range"
      placeholder="Select date range"
      [defaultDate]="dateRangeValue"
      (dateChange)="onDateRangeChange($event)"
    />
  </div>
</div>
