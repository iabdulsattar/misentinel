<div class="fixed top-4 right-4 z-[999999] flex flex-col gap-3 w-full max-w-sm pointer-events-none">
  @for (toast of toasts | async; track toast.id) {
    <div 
      class="pointer-events-auto toast-item relative flex items-start gap-3 p-4 rounded-xl border shadow-lg overflow-hidden"
      [ngClass]="getTypeStyles(toast.type).container"
    >
      @if (toast.duration !== 0) {
        <div class="absolute bottom-0 left-0 h-1 rounded-b-xl toast-progress"
             [ngClass]="getTypeStyles(toast.type).progress"
             [style.animation-duration]="getProgressStyle(toast).animationDuration">
        </div>
      }

      <div class="shrink-0 mt-0.5" [innerHTML]="getIcon(toast.type)" [class]="getTypeStyles(toast.type).icon + ' rounded-full p-1'"></div>

      <div class="flex-1 min-w-0 pr-6">
        <p class="text-sm font-medium text-gray-900 leading-relaxed">{{ toast.message }}</p>
      </div>

      <button 
        (click)="dismiss(toast.id)" 
        class="absolute top-3 right-3 text-gray-400 hover:text-gray-600 transition-colors"
        type="button"
      >
        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>
  }
</div>
