<div #containerRef class="relative w-full">
  <button
    type="button"
    (click)="toggleDropdown()"
    [disabled]="disabled"
    class="flex h-11 w-full items-center justify-between rounded-lg border border-gray-300 bg-white px-3.5 py-2 text-theme-xs text-gray-700 focus:outline-none focus:border-brand-500 disabled:cursor-not-allowed disabled:opacity-60 dark:border-gray-700 dark:bg-gray-900 dark:text-gray-300"
  >
    <span [ngClass]="selectedLabel ? 'text-gray-700 dark:text-gray-300' : 'text-gray-400'">
      {{ selectedLabel || placeholder }}
    </span>
    <svg
      class="stroke-current text-gray-400"
      [ngClass]="{ 'rotate-180': isOpen }"
      width="18"
      height="18"
      viewBox="0 0 20 20"
      fill="none"
    >
      <path d="M4.79175 7.39551L10.0001 12.6038L15.2084 7.39551" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
    </svg>
  </button>

  @if (isOpen) {
    <div
      class="absolute left-0 top-full z-40 mt-1 w-full overflow-y-auto rounded-lg border border-gray-200 bg-white shadow-lg dark:border-gray-700 dark:bg-gray-900"
      (click)="$event.stopPropagation()"
    >
      @for (option of options; track option.value) {
        <button
          type="button"
          (click)="select(option)"
          class="flex w-full items-center px-3 py-2 text-left text-theme-xs"
          [ngClass]="option.value === value
            ? 'bg-brand-50 font-medium text-brand-700 dark:bg-white/[0.03] dark:text-white'
            : 'text-gray-700 hover:bg-gray-100 dark:text-gray-300 dark:hover:bg-white/[0.03]'"
        >
          {{ option.label }}
        </button>
      }
    </div>
  }
</div>
