<div #containerRef class="relative w-full">
  <button
    type="button"
    (click)="toggleDropdown()"
    [disabled]="disabled"
    class="flex h-11 w-full items-center justify-between rounded-lg border border-gray-300 bg-white px-3.5 py-2 text-sm text-gray-700 focus:outline-none focus:border-brand-500 disabled:cursor-not-allowed disabled:opacity-60 dark:border-gray-700 dark:bg-gray-900 dark:text-gray-300"
  >
    <div class="flex flex-wrap flex-auto gap-2">
      @if (selectedValuesText.length > 0) {
        @for (text of selectedValuesText; track $index; let i = $index) {
          <span class="inline-flex items-center rounded-full border border-transparent bg-gray-100 py-0.5 pl-2 pr-1 text-xs text-gray-800 dark:bg-gray-800 dark:text-white/90">
            <span class="max-w-full">{{ text }}</span>
            <button
              type="button"
              (click)="removeOption(selectedOptions[i]); $event.stopPropagation()"
              class="ml-1 text-gray-500 hover:text-gray-400 dark:text-gray-400"
            >
              <svg class="fill-current" role="button" width="14" height="14" viewBox="0 0 14 14">
                <path
                  fill-rule="evenodd"
                  clip-rule="evenodd"
                  d="M3.40717 4.46881C3.11428 4.17591 3.11428 3.70104 3.40717 3.40815C3.70006 3.11525 4.17494 3.11525 4.46783 3.40815L6.99943 5.93975L9.53095 3.40822C9.82385 3.11533 10.2987 3.11533 10.5916 3.40822C10.8845 3.70112 10.8845 4.17599 10.5916 4.46888L8.06009 7.00041L10.5916 9.53193C10.8845 9.82482 10.8845 10.2997 10.5916 10.5926C10.2987 10.8855 9.82385 10.8855 10.5916 10.5926L6.99943 8.06107L4.46783 10.5927C4.17494 10.8856 3.70006 10.8856 3.40717 10.5927L5.93877 7.00041L3.40717 4.46881Z"
                />
              </svg>
            </button>
          </span>
        }
      } @else {
        <span class="text-gray-400">Select option</span>
      }
    </div>
    <svg
      class="stroke-current text-gray-400"
      [ngClass]="{ 'rotate-180': isOpen }"
      width="18"
      height="18"
      viewBox="0 0 20 20"
      fill="none"
    >
      <path d="M4.79175 7.39551L10.0001 12.6038L15.2084 7.39551" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
    </svg>
  </button>

  @if (isOpen) {
    <div
      class="absolute left-0 top-full z-40 mt-1 w-full overflow-y-auto rounded-lg border border-gray-200 bg-white shadow-lg dark:border-gray-700 dark:bg-gray-900"
      (click)="$event.stopPropagation()"
    >
      @for (option of options; track option.value) {
        <button
          type="button"
          (click)="handleSelect(option.value)"
          class="flex w-full items-center px-3 py-2 text-left text-sm"
          [ngClass]="selectedOptions.includes(option.value)
            ? 'bg-brand-50 font-medium text-brand-700 dark:bg-white/[0.03] dark:text-white'
            : 'text-gray-700 hover:bg-gray-100 dark:text-gray-300 dark:hover:bg-white/[0.03]'"
        >
          {{ option.text }}
        </button>
      } @empty {
        <div class="px-3 py-2 text-sm text-gray-500">No options available</div>
      }
    </div>
  }
</div>
