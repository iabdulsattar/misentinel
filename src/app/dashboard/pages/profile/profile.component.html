<app-page-breadcrumb pageTitle="Profile" />
<div class="rounded-2xl border border-gray-200 bg-white p-5 dark:border-gray-800 dark:bg-white/[0.03] lg:p-6">
  <h3 class="mb-5 text-lg font-semibold text-gray-800 dark:text-white/90 lg:mb-7">
    Profile
  </h3>
  @if (loading) {
    <div class="flex items-center justify-center py-10 text-sm text-gray-400">
      Loading profile...
    </div>
  } @else {
  <div class="space-y-6">
    <div>
      <app-user-meta-card [user]="profile" />
    </div>
    <div>
      <app-user-info-card [user]="profile" />
    </div>
    <div>
      <app-user-address-card [address]="{
        country: profile.location || 'N/A',
        cityState: profile.location || 'N/A',
        postalCode: '-',
        taxId: '-'
      }" />
    </div>
  </div>
  }
</div>
