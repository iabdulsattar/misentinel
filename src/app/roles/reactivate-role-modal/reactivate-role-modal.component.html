<app-modal [isOpen]="true" [showCloseButton]="false" (close)="cancel()" className="max-w-md">
  <div class="p-6 sm:p-8 relative">

    <div class="flex items-start justify-between mb-6">
      <h2 class="text-xl font-bold text-slate-900">Reactivate Role</h2>
      <button (click)="cancel()" class="text-slate-400 hover:text-slate-600">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
    </div>

    <div class="flex flex-col items-center text-center mb-6">
      <div class="flex h-16 w-16 items-center justify-center rounded-full bg-green-50 mb-4">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-green-500"><polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
      </div>
      <p class="text-lg font-bold text-slate-900">
        Reactivate <span class="text-indigo-600">{{ role()?.name }}</span>?
      </p>
    </div>

    <p class="text-sm font-semibold text-slate-800 mb-3">This role will:</p>
    <ul class="space-y-3 mb-6">
      <li class="flex items-start gap-2.5 text-sm text-slate-600">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-green-500 mt-0.5 shrink-0"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
        Be available for assignment to new users.
      </li>
      <li class="flex items-start gap-2.5 text-sm text-slate-600">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-green-500 mt-0.5 shrink-0"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
        Restore all permissions and settings.
      </li>
      <li class="flex items-start gap-2.5 text-sm text-slate-600">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-green-500 mt-0.5 shrink-0"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
        Existing users will retain their current access.
      </li>
    </ul>

    @if (statusMessage) {
      <div class="flex items-start gap-2.5 rounded-xl p-3.5 mb-5"
           [class.bg-green-50]="statusType === 'success'"
           [class.border]="statusType === 'success'"
           [class.border-green-100]="statusType === 'success'"
           [class.bg-red-50]="statusType === 'error'"
           [class.border]="statusType === 'error'"
           [class.border-red-100]="statusType === 'error'">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
             class="mt-0.5 shrink-0"
             [class.text-green-500]="statusType === 'success'"
             [class.text-red-500]="statusType === 'error'">
          @if (statusType === 'success') {
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline>
          } @else {
            <circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line>
          }
        </svg>
        <p class="text-sm font-medium"
           [class.text-green-700]="statusType === 'success'"
           [class.text-red-700]="statusType === 'error'">{{ statusMessage }}</p>
      </div>
    }

    <div class="flex justify-end gap-3">
      <button (click)="cancel()" class="px-5 py-2.5 rounded-lg border border-slate-200 text-slate-700 font-semibold text-sm hover:bg-slate-50">
        Cancel
      </button>
      <button (click)="confirm()" [disabled]="reactivating" class="flex items-center gap-2 px-5 py-2.5 rounded-lg bg-gradient-to-r from-indigo-600 to-violet-600 text-white font-semibold text-sm hover:opacity-90 disabled:opacity-70">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
        <span *ngIf="!reactivating">Reactivate Role</span>
        <span *ngIf="reactivating">Reactivating...</span>
      </button>
    </div>

  </div>
</app-modal>
