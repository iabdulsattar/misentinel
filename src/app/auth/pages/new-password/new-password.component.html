<app-auth-page-layout>


  <div class="flex flex-col justify-center flex-1 w-full max-w-lg mx-auto">
    <div>
      <div class="mb-5 sm:mb-8 text-center">
        <h1 class="mb-2 font-semibold text-gray-800 text-title-sm dark:text-white/90 sm:text-title-md">
          Reset Password
        </h1>
        <p class="text-sm text-gray-500 dark:text-gray-400">
          Enter your new password below.
        </p>
      </div>

      @if (errorMessage) {
      <div class="mb-5 p-4 rounded-lg bg-error-50 border border-error-200">
        <p class="text-sm text-error-700">{{ errorMessage }}</p>
      </div>
      }

      @if (successMessage) {
      <div class="mb-5 p-4 rounded-lg bg-success-50 border border-success-200">
        <p class="text-sm text-success-700">{{ successMessage }}</p>
      </div>
      }

      <form (ngSubmit)="onSubmit()" class="space-y-6">
        <div>
          <app-label>New Password <span class="text-error-500">*</span></app-label>
          <div class="relative">
            <span class="absolute z-10 left-0 top-1/2 -translate-y-1/2 border-r border-gray-200 px-3.5 py-3 text-gray-500 dark:border-gray-800 dark:text-gray-400">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-lock-icon lucide-lock"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </span>
            <app-input-field
              type="password"
              placeholder="Enter new password"
              [(value)]="newPassword"
              name="newPassword"
              class="form-input"
              className="pl-[62px]"
              [error]="!!errorMessage"
              required
              minlength="6"
            />
          </div>
          <p class="mt-1 text-xs text-gray-500 dark:text-gray-400">Must be at least 6 characters.</p>
        </div>

        <div>
          <app-label>Confirm Password <span class="text-error-500">*</span></app-label>
          <div class="relative">
            <span class="absolute z-10 left-0 top-1/2 -translate-y-1/2 border-r border-gray-200 px-3.5 py-3 text-gray-500 dark:border-gray-800 dark:text-gray-400">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-lock-icon lucide-lock"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </span>
            <app-input-field
              type="password"
              placeholder="Re-enter new password"
              [(value)]="confirmPassword"
              name="confirmPassword"
              class="form-input"
              className="pl-[62px]"
              [error]="!!errorMessage"
              required
            />
          </div>
        </div>

        <button
          type="submit"
          class="flex items-center justify-center w-full px-4 py-3 text-sm font-medium text-white transition rounded-lg bg-brand-500 shadow-theme-xs hover:bg-brand-600 disabled:opacity-50"
          [disabled]="isLoading"
        >
          {{ isLoading ? 'Updating...' : 'Update Password' }}
        </button>

        <app-button
          className="w-full"
          size="sm"
          variant="outline"
          routerLink="/signin"
        >
          Back to Login
        </app-button>
      </form>
    </div>
  </div>
</app-auth-page-layout>
