      <!-- Form -->
      <form (ngSubmit)="onSignIn()" class="space-y-6">

        <div class="flex">
        <div class="w-1/6 mr-2">               
          <app-input-field
            type="text"
            placeholder=""
            name="d1"
            class="form-input"
            [maxlength]="1"
            [(value)]="d1"
            className="text-center"
            required
          />
        </div> 
        
        <div class="w-1/6 mr-2">               
          <app-input-field
            type="text"
            placeholder=""
            name="d2"
            class="form-input"
            [maxlength]="1"
            [(value)]="d2"
            className="text-center"            
            required
          />
        </div>

        <div class="w-1/6 mr-2">               
          <app-input-field
            type="text"
            placeholder=""
            name="d3"
            class="form-input"
            [maxlength]="1"
            [(value)]="d3"
            className="text-center"            
            required
          />
        </div>
        
        <div class="w-1/6 mr-2">               
          <app-input-field
            type="text"
            placeholder=""
            name="d4"
            class="form-input"
            [maxlength]="1"
            [(value)]="d4"
            className="text-center"            
            required
          />
        </div>
        
        <div class="w-1/6 mr-2">               
          <app-input-field
            type="text"
            placeholder=""
            name="d5"
            class="form-input"
            [maxlength]="1"
            className="text-center"            
            required
          />
        </div>
        
        <div class="w-1/6 ">               
          <app-input-field
            type="text"
            placeholder=""
            name="d6"
            class="form-input"
            [maxlength]="1"
            className="text-center"            
            required
          />
        </div>
        
        </div> 

        
        <div class="mt-5 mb-2">
          <p class="text-sm font-normal text-center text-gray-700 dark:text-gray-400 ">
            Didn't receive the code?
            <a class="text-brand-500 hover:text-brand-600 dark:text-brand-400">
              Resend Code
            </a>
          </p>
        </div>
        
        <div class="flex items-center gap-3 justify-center">
          <app-checkbox className="w-5 h-5" [(checked)]="isCheckedOne" />
          <p class="inline-block font-normal text-gray-500 dark:text-gray-400">
            Remember this device for next 7 days
          </p>
        </div>
         
        <app-button
          className="w-full mb-5"
          size="sm"
          variant="outline"
          (btnClick)="onSignIn()"
        >
          Verify Code          
        </app-button>

        <app-button
          className="w-full"
          size="sm"
          variant="outline"
          routerLink="/signin"
        >
          Back to Sign In
        </app-button>

      </form>
         
        
    </div>
  </div>
