<app-auth-page-layout>
  <div class="w-full max-w-lg pt-10 mx-auto">
    <a
      routerLink="/"
      class="inline-flex items-center text-sm text-gray-500 transition-colors hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-300"
    >
      <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 20 20" fill="none" class="size-5">
        <path d="M12.7083 5L7.5 10.2083L12.7083 15.4167" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path>
      </svg>
      Back to dashboard
    </a>
  </div>

  <div class="flex flex-col justify-center flex-1 w-full max-w-lg mx-auto">
    <div>
      <div class="mb-5 sm:mb-8 text-center">
        <h1 class="mb-2 font-semibold text-gray-800 text-title-sm dark:text-white/90 sm:text-title-md">
          Reset Password
        </h1>
        <p class="text-sm text-gray-500 dark:text-gray-400">
          Enter your new password below.
        </p>
      </div>

      @if (errorMessage) {
        <div class="mb-4 text-sm text-red-600 text-center">{{ errorMessage }}</div>
      }
      @if (successMessage) {
        <div class="mb-4 text-sm text-green-600 text-center">{{ successMessage }}</div>
      }

      <form (ngSubmit)="onSubmit()" class="space-y-6">
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-200 mb-2">
            New Password
          </label>
          <input
            type="password"
            name="newPassword"
            class="w-full rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-900 px-4 py-3 text-sm"
            [(ngModel)]="newPassword"
            required
            minlength="6"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-200 mb-2">
            Confirm Password
          </label>
          <input
            type="password"
            name="confirmPassword"
            class="w-full rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-900 px-4 py-3 text-sm"
            [(ngModel)]="confirmPassword"
            required
          />
        </div>

        <button
          type="submit"
          class="flex items-center justify-center w-full px-4 py-3 text-sm font-medium text-white transition rounded-lg bg-brand-500 shadow-theme-xs hover:bg-brand-600 disabled:opacity-50"
          [disabled]="isLoading"
        >
          {{ isLoading ? 'Updating...' : 'Update Password' }}
        </button>

        <app-button className="w-full" size="sm" variant="outline" routerLink="/signin">
          Back to Login
        </app-button>
      </form>
    </div>
  </div>
</app-auth-page-layout>
